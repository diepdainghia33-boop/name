version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: chatid-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: architect_user
      MYSQL_PASSWORD: user_password
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql

  backend:
    build:
      context: ./BackEnd
    container_name: chatid-backend
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./BackEnd:/var/www
    ports:
      - "8000:8000"
    depends_on:
      - mysql
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=laravel
      - DB_USERNAME=architect_user
      - DB_PASSWORD=user_password

  frontend:
    build:
      context: ./frontend
    container_name: chatid-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  db-data:
