# Render Blueprint — backend ChatID (Docker)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: chatid-backend
    runtime: docker
    dockerfilePath: ./BackEnd/Dockerfile
    dockerContext: ./BackEnd
    plan: free
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_URL
        value: https://chatid-backend.onrender.com
      - key: FRONTEND_URL
        value: https://chat-bot-fe49e.web.app
      - key: CORS_ALLOWED_ORIGINS
        value: https://chat-bot-fe49e.web.app,https://chat-bot-fe49e.firebaseapp.com
      - key: CORS_ALLOW_ALL
        value: "true"
      - key: DB_CONNECTION
        value: mysql
      - key: DB_DATABASE
        value: test
      - key: DB_PORT
        value: "4000"
      - key: MYSQL_ATTR_SSL_CA
        value: /etc/ssl/certs/ca-certificates.crt
      - key: CACHE_STORE
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: AI_SERVICE_URL
        value: https://chatid-ai.onrender.com
      - key: APP_KEY
        generateValue: true
      - key: DB_HOST
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: REDIS_URL
        sync: false
