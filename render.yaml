# Render Blueprint — ChatID stack
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: chatid-backend
    runtime: docker
    dockerfilePath: ./BackEnd/Dockerfile
    dockerContext: ./BackEnd
    plan: free
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_URL
        value: https://chatid-backend.onrender.com
      - key: FRONTEND_URL
        value: https://chat-bot-fe49e.web.app
      - key: CORS_ALLOWED_ORIGINS
        value: https://chat-bot-fe49e.web.app,https://chat-bot-fe49e.firebaseapp.com
      - key: CORS_ALLOW_ALL
        value: "true"
      - key: DB_CONNECTION
        value: mysql
      - key: DB_DATABASE
        value: test
      - key: DB_PORT
        value: "4000"
      - key: MYSQL_ATTR_SSL_CA
        value: /etc/ssl/certs/ca-certificates.crt
      - key: CACHE_STORE
        value: redis
      - key: SESSION_DRIVER
        value: redis
      - key: QUEUE_CONNECTION
        value: sync
      - key: AI_SERVICE_URL
        value: http://chatid-ai:10000 # <--- SỬA LỖI 1: Cập nhật đúng port nội bộ Render
      - key: APP_KEY
        generateValue: true
      - key: PORT
        value: "8000" # <--- SỬA LỖI 2: Ép cổng nội bộ thành 8000
      - key: DB_HOST
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: chatid-redis
          property: connectionString

  - type: web
    name: chatid-ai
    runtime: docker
    dockerfilePath: ./ai_service/Dockerfile
    dockerContext: ./ai_service
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DISABLE_TRANSFORMERS
        value: "1"
      - key: PORT
        value: "10000"
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "4000"
      - key: DB_DATABASE
        value: test
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: MYSQL_ATTR_SSL_CA
        value: /etc/ssl/certs/ca-certificates.crt
      - key: REDIS_URL
        fromService:
          type: redis
          name: chatid-redis
          property: connectionString

  - type: redis
    name: chatid-redis
    plan: free
    ipAllowList: [] # Allow only internal traffic
